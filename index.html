<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f4;
      --muted: #6e6e80;
      --danger: #ff4d6d;
      --success: #4dffb4;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 28px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: inline-block;
      position: relative;
      top: 6px;
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .total-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--muted);
    }

    .total-badge span {
      color: var(--accent);
      font-size: 18px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px 10px 42px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      width: 260px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
    }

    /* ── MAIN GRID ── */
    main {
      padding: 32px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── FORM ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input-group {
      position: relative;
    }

    .input-group.full { grid-column: 1 / -1; }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.07);
    }

    .btn {
      padding: 11px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0f;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255,77,109,0.3);
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-edit {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger:hover { background: rgba(255,77,109,0.1); }
    .btn-edit:hover { background: var(--surface2); color: var(--text); }

    .form-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── STATUS CARD ── */
    .status-card {
      background: linear-gradient(135deg, #1a1a22 0%, #16161a 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 200px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s 0.1s ease both;
    }

    .status-card::after {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(232,255,71,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .status-headline {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -1px;
    }

    .status-headline em {
      font-style: normal;
      color: var(--accent);
    }

    .status-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 10px;
    }

    .status-footer {
      margin-top: 20px;
      display: flex;
      gap: 20px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    /* ── TABLE CARD ── */
    .table-card {
      grid-column: 1 / -1;
      animation: fadeUp 0.4s 0.2s ease both;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface2);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover { color: var(--text); }

    th.sorted { color: var(--accent); }

    th .sort-arrow { margin-left: 4px; opacity: 0.5; }
    th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:hover { background: rgba(255,255,255,0.02); }

    td {
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text);
    }

    td.id { color: var(--muted); font-size: 13px; font-family: monospace; }
    td.price { color: var(--accent); font-weight: 600; font-family: 'Syne', sans-serif; }

    .qty-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
    }

    .qty-low { background: rgba(255,77,109,0.12); color: var(--danger); }
    .qty-mid { background: rgba(255,107,53,0.12); color: var(--accent2); }
    .qty-ok  { background: rgba(77,255,180,0.1); color: var(--success); }

    .actions { display: flex; gap: 8px; }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      max-width: 300px;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid var(--success); }
    #toast.error   { border-left: 3px solid var(--danger); }

    /* ── LOADING ── */
    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingRow td { text-align: center; padding: 40px; color: var(--muted); }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      .table-card { grid-column: 1; }
      header { flex-wrap: wrap; }
      #searchInput { width: 200px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-mark"></div>
      <h1>Inven<span>tory</span></h1>
    </div>
    <div class="header-right">
      <div class="total-badge">Total: <span id="totalCount">0</span></div>
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search by id, name or description…" oninput="filterProducts()"/>
      </div>
    </div>
  </header>

  <main>

    <!-- ADD / EDIT FORM -->
    <div class="card" style="animation-delay:0s">
      <div class="card-title" id="formTitle">Add Product</div>
      <div class="form-grid">
        <div class="input-group">
          <input type="number" id="fId" placeholder="ID" min="1"/>
        </div>
        <div class="input-group">
          <input type="text" id="fName" placeholder="Name"/>
        </div>
        <div class="input-group full">
          <input type="text" id="fDesc" placeholder="Description"/>
        </div>
        <div class="input-group">
          <input type="number" id="fPrice" placeholder="Price" min="0"/>
        </div>
        <div class="input-group">
          <input type="number" id="fQty" placeholder="Quantity" min="0"/>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitForm()">Add</button>
        <button class="btn btn-cancel" id="cancelBtn" onclick="resetForm()" style="display:none">Cancel</button>
      </div>
    </div>

    <!-- STATUS CARD -->
    <div class="status-card">
      <div>
        <div class="status-headline">Track.<br/><em>Manage.</em> Grow.</div>
        <div class="status-sub">Streamline your inventory with fast product management that scales with your business.</div>
      </div>
      <div class="status-footer">
        <div class="stat">
          <div class="stat-val" id="statProducts">0</div>
          <div class="stat-label">Products</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statStock">0</div>
          <div class="stat-label">Total Stock</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statValue">₹0</div>
          <div class="stat-label">Total Value</div>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card table-card">
      <div class="card-title">Products</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('id')" id="th-id">ID <span class="sort-arrow">↑</span></th>
              <th onclick="sortBy('name')" id="th-name">Name <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('description')" id="th-description">Description <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('price')" id="th-price">Price <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('quantity')" id="th-quantity">Quantity <span class="sort-arrow">↕</span></th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr id="loadingRow"><td colspan="6"><span class="loader"></span> Loading products…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8000';
  let allProducts = [];
  let editingId = null;
  let sortKey = 'id';
  let sortAsc = true;

  // ── FETCH ──────────────────────────────────────────
  async function loadProducts() {
    try {
      const res = await fetch(`${API}/products`);
      allProducts = await res.json();
      allProducts.sort((a, b) => {
        let va = a[sortKey], vb = b[sortKey];
        if (typeof va === 'string') va = va.toLowerCase(), vb = vb.toLowerCase();
        return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
      });
      renderTable(allProducts);
      updateStats(allProducts);
    } catch (e) {
      document.getElementById('tableBody').innerHTML =
        `<tr><td colspan="6" class="empty">⚠ Cannot reach backend. Make sure FastAPI is running on port 8000.</td></tr>`;
    }
  }

  // ── RENDER ─────────────────────────────────────────
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    document.getElementById('totalCount').textContent = data.length;
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">No products found.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(p => {
      const qClass = p.quantity <= 2 ? 'qty-low' : p.quantity <= 5 ? 'qty-mid' : 'qty-ok';
      return `
        <tr>
          <td class="id">#${p.id}</td>
          <td>${esc(p.name)}</td>
          <td>${esc(p.description)}</td>
          <td class="price">₹${p.price.toLocaleString('en-IN')}</td>
          <td><span class="qty-badge ${qClass}">${p.quantity}</span></td>
          <td class="actions">
            <button class="btn btn-edit" onclick="startEdit(${p.id})">Edit</button>
            <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>`;
    }).join('');
  }

  function updateStats(data) {
    document.getElementById('statProducts').textContent = data.length;
    const stock = data.reduce((s, p) => s + p.quantity, 0);
    const val   = data.reduce((s, p) => s + p.price * p.quantity, 0);
    document.getElementById('statStock').textContent = stock;
    document.getElementById('statValue').textContent = '₹' + val.toLocaleString('en-IN');
  }

  // ── ADD / EDIT ─────────────────────────────────────
  async function submitForm() {
    const id   = parseInt(document.getElementById('fId').value);
    const name = document.getElementById('fName').value.trim();
    const desc = document.getElementById('fDesc').value.trim();
    const price= parseInt(document.getElementById('fPrice').value);
    const qty  = parseInt(document.getElementById('fQty').value);

    if (!id || !name || !desc || isNaN(price) || isNaN(qty)) {
      toast('Please fill in all fields.', 'error'); return;
    }

    const body = JSON.stringify({ id, name, description: desc, price, quantity: qty });
    const headers = { 'Content-Type': 'application/json' };

    try {
      if (editingId !== null) {
        await fetch(`${API}/products/${editingId}`, { method: 'PUT', headers, body });
        toast('Product updated!', 'success');
      } else {
        await fetch(`${API}/products`, { method: 'POST', headers, body });
        toast('Product added!', 'success');
      }
      resetForm();
      loadProducts();
    } catch (e) { toast('Request failed.', 'error'); }
  }

  function startEdit(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('fId').value    = p.id;
    document.getElementById('fName').value  = p.name;
    document.getElementById('fDesc').value  = p.description;
    document.getElementById('fPrice').value = p.price;
    document.getElementById('fQty').value   = p.quantity;
    document.getElementById('fId').disabled = true;
    document.getElementById('formTitle').textContent = 'Edit Product';
    document.querySelector('.form-actions .btn-primary').textContent = 'Update';
    document.getElementById('cancelBtn').style.display = '';
    document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
  }

  function resetForm() {
    editingId = null;
    ['fId','fName','fDesc','fPrice','fQty'].forEach(id => {
      document.getElementById(id).value = '';
      document.getElementById(id).disabled = false;
    });
    document.getElementById('formTitle').textContent = 'Add Product';
    document.querySelector('.form-actions .btn-primary').textContent = 'Add';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  // ── DELETE ─────────────────────────────────────────
  async function deleteProduct(id) {
    if (!confirm(`Delete product #${id}?`)) return;
    try {
      await fetch(`${API}/products/${id}`, { method: 'DELETE' });
      toast('Product deleted.', 'success');
      loadProducts();
    } catch (e) { toast('Delete failed.', 'error'); }
  }

  // ── SEARCH ─────────────────────────────────────────
  function filterProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allProducts.filter(p =>
      String(p.id).includes(q) ||
      p.name.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q)
    );
    renderTable(filtered);
    updateStats(filtered);
  }

  // ── SORT ───────────────────────────────────────────
  function sortBy(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
    const th = document.getElementById('th-' + key);
    if (th) {
      th.classList.add('sorted');
      th.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
    }
    allProducts.sort((a, b) => {
      let va = a[key], vb = b[key];
      if (typeof va === 'string') va = va.toLowerCase(), vb = vb.toLowerCase();
      return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    renderTable(allProducts);
  }

  // ── TOAST ──────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadProducts();
</script>
</body>
</html>
